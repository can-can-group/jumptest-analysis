# Jump Test API only (MongoDB from .env / cloud)
# Usage: docker compose up -d
# API: http://localhost:8000  Docs: http://localhost:8000/docs
# Set MONGODB_URI (and MONGODB_DB) in .env to your cloud database.

services:
  api:
    build: .
    ports:
      - "8765:8765"
    env_file:
      - .env
    restart: unless-stopped
