# Jump Test API + MongoDB
# Usage: docker compose up -d
# API: http://localhost:8000  Docs: http://localhost:8000/docs

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: jumptest
      # Override or set in .env: ADMIN_SECRET, JWT_SECRET, SMTP_*, EMAIL_BASE_URL
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongodb_data:
